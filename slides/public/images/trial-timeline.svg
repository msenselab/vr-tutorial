<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Inter, system-ui, sans-serif">
  <!-- Timeline base -->
  <line x1="40" y1="100" x2="660" y2="100" stroke="#d1d5db" stroke-width="2"/>

  <!-- Arrow at end -->
  <polygon points="656,94 668,100 656,106" fill="#d1d5db"/>

  <!-- INSTRUCTION phase -->
  <rect x="50" y="60" width="120" height="50" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">INSTRUCTION</text>
  <text x="110" y="98" text-anchor="middle" font-size="10" fill="#3b82f6">"Press SPACE"</text>
  <!-- tick -->
  <line x1="110" y1="110" x2="110" y2="125" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="110" cy="128" r="3" fill="#93c5fd"/>

  <!-- Transition arrow -->
  <text x="185" y="90" text-anchor="middle" font-size="9" fill="#6b7280">SPACE</text>
  <line x1="170" y1="100" x2="200" y2="100" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- FIXATION phase -->
  <rect x="200" y="60" width="100" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="250" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">FIXATION</text>
  <text x="250" y="98" text-anchor="middle" font-size="22" fill="#f59e0b">+</text>
  <!-- tick -->
  <line x1="250" y1="110" x2="250" y2="125" stroke="#fcd34d" stroke-width="1.5"/>
  <circle cx="250" cy="128" r="3" fill="#fcd34d"/>
  <!-- duration -->
  <text x="250" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">1.0 s</text>

  <!-- Transition arrow -->
  <text x="315" y="90" text-anchor="middle" font-size="9" fill="#6b7280">timeout</text>
  <line x1="300" y1="100" x2="330" y2="100" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- TASK phase -->
  <rect x="330" y="55" width="130" height="58" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="395" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">TASK</text>
  <text x="395" y="93" text-anchor="middle" font-size="10" fill="#16a34a">Collect stars</text>
  <text x="395" y="105" text-anchor="middle" font-size="10" fill="#16a34a">Navigate maze</text>
  <!-- tick -->
  <line x1="395" y1="113" x2="395" y2="125" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="395" cy="128" r="3" fill="#86efac"/>
  <!-- duration -->
  <text x="395" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">variable</text>

  <!-- Transition arrow -->
  <text x="478" y="90" text-anchor="middle" font-size="9" fill="#6b7280">done/ESC</text>
  <line x1="460" y1="100" x2="490" y2="100" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- FEEDBACK phase -->
  <rect x="490" y="60" width="110" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="545" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">FEEDBACK</text>
  <text x="545" y="98" text-anchor="middle" font-size="10" fill="#7c3aed">Score &amp; time</text>
  <!-- tick -->
  <line x1="545" y1="110" x2="545" y2="125" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="545" cy="128" r="3" fill="#c4b5fd"/>

  <!-- Loop arrow back -->
  <path d="M600,85 Q640,85 640,50 Q640,20 395,20 Q110,20 80,50 Q60,65 60,60" fill="none" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3"/>
  <polygon points="56,62 60,52 64,62" fill="#9ca3af"/>
  <text x="395" y="14" text-anchor="middle" font-size="10" fill="#6b7280">SPACE → next trial</text>

  <!-- Trigger markers -->
  <g font-size="9" fill="#dc2626">
    <line x1="200" y1="100" x2="200" y2="170" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="200" y="182" text-anchor="middle">TRG 1</text>
    <line x1="330" y1="100" x2="330" y2="170" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="330" y="182" text-anchor="middle">TRG 2</text>
    <line x1="460" y1="100" x2="460" y2="170" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="460" y="182" text-anchor="middle">TRG 4</text>
  </g>

  <!-- Time arrow label -->
  <text x="660" y="120" font-size="10" fill="#9ca3af">time</text>
</svg>
