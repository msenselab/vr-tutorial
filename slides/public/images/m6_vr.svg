<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
    <radialGradient id="lensL6" cx="35%" cy="45%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#64b5f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:0.7"/>
    </radialGradient>
    <radialGradient id="lensR6" cx="65%" cy="45%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#64b5f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:0.7"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg6)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- VR Headset body -->
  <g transform="translate(400, 225)">
    <!-- Main body shadow -->
    <ellipse cx="2" cy="4" rx="205" ry="125" fill="#c5d0f0" opacity="0.4"/>
    <!-- Main body -->
    <path d="M-200,-80 Q-220,-92 -198,-112 L-50,-122 Q0,-132 50,-122 L198,-112 Q220,-92 200,-80 L200,80 Q220,92 198,112 L50,122 Q0,132 -50,122 L-198,112 Q-220,92 -200,80 Z"
          fill="white" stroke="#3d5a99" stroke-width="2.5"/>
    <!-- Strap top -->
    <path d="M-178,-100 Q0,-162 178,-100" fill="none" stroke="#5c6bc0" stroke-width="9" stroke-linecap="round"/>
    <!-- Strap bottom -->
    <path d="M-178,100 Q0,162 178,100" fill="none" stroke="#5c6bc0" stroke-width="9" stroke-linecap="round"/>
    <!-- Left lens -->
    <ellipse cx="-80" cy="0" rx="66" ry="72" fill="url(#lensL6)" stroke="#1e88e5" stroke-width="2.5"/>
    <!-- Right lens -->
    <ellipse cx="80" cy="0" rx="66" ry="72" fill="url(#lensR6)" stroke="#1e88e5" stroke-width="2.5"/>
    <!-- Lens inner ring -->
    <ellipse cx="-80" cy="0" rx="50" ry="56" fill="none" stroke="#42a5f5" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="80" cy="0" rx="50" ry="56" fill="none" stroke="#42a5f5" stroke-width="1.2" opacity="0.6"/>
    <!-- Mini scene inside left lens -->
    <line x1="-118" y1="-5" x2="-42" y2="-5" stroke="#1565c0" stroke-width="1" opacity="0.6"/>
    <line x1="-80" y1="-42" x2="-80" y2="32" stroke="#1565c0" stroke-width="1" opacity="0.6"/>
    <rect x="-105" y="-35" width="40" height="30" fill="none" stroke="#1e88e5" stroke-width="1" opacity="0.5"/>
    <!-- Center bridge -->
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#e8eaf6" stroke="#3d5a99" stroke-width="1.8"/>
    <!-- Power LED -->
    <circle cx="0" cy="0" r="5" fill="#42a5f5" opacity="0.9"/>
  </g>
  <!-- Labels -->
  <text x="68" y="175" font-family="sans-serif" font-size="12" fill="#1e88e5" font-weight="bold">OpenXR</text>
  <text x="660" y="175" font-family="sans-serif" font-size="12" fill="#1e88e5" font-weight="bold">SteamVR</text>
  <!-- Bottom label -->
  <rect x="190" y="365" width="420" height="30" rx="6" fill="white" stroke="#c5d0f0" stroke-width="1"/>
  <text x="400" y="385" font-family="monospace" font-size="11" fill="#607d8b" text-anchor="middle">panda3d-openxr · Meta Quest · Pimax · Valve Index</text>
</svg>
