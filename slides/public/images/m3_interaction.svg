<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#eee8fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Gamepad body -->
  <g transform="translate(350, 225)">
    <!-- Body -->
    <path d="M-130,-55 Q-150,-85 -110,-95 L110,-95 Q150,-85 130,-55 L140,20 Q130,65 85,75 L-85,75 Q-130,65 -140,20 Z"
          fill="white" stroke="#5c6bc0" stroke-width="2.5"/>
    <!-- Left grip -->
    <path d="M-140,20 Q-170,45 -160,85 Q-148,115 -105,105 L-85,75" fill="#f5f5ff" stroke="#5c6bc0" stroke-width="2"/>
    <!-- Right grip -->
    <path d="M140,20 Q170,45 160,85 Q148,115 105,105 L85,75" fill="#f5f5ff" stroke="#5c6bc0" stroke-width="2"/>
    <!-- D-pad horizontal -->
    <rect x="-105" y="-8" width="50" height="16" rx="4" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <!-- D-pad vertical -->
    <rect x="-88" y="-25" width="16" height="50" rx="4" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <!-- D-pad center -->
    <rect x="-88" y="-8" width="16" height="16" rx="2" fill="#c5cae9"/>
    <!-- Action buttons -->
    <circle cx="72" cy="-32" r="12" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="72" y="-27" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e53935" text-anchor="middle">B</text>
    <circle cx="94" cy="-10" r="12" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="94" y="-5" font-family="sans-serif" font-size="11" font-weight="bold" fill="#43a047" text-anchor="middle">A</text>
    <circle cx="50" cy="-10" r="12" fill="#bbdefb" stroke="#1e88e5" stroke-width="1.5"/>
    <text x="50" y="-5" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e88e5" text-anchor="middle">X</text>
    <circle cx="72" cy="12" r="12" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text x="72" y="17" font-family="sans-serif" font-size="11" font-weight="bold" fill="#f9a825" text-anchor="middle">Y</text>
    <!-- Analog sticks -->
    <circle cx="-42" cy="25" r="20" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
    <circle cx="-42" cy="25" r="10" fill="#c5cae9"/>
    <circle cx="32" cy="25" r="20" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
    <circle cx="32" cy="25" r="10" fill="#c5cae9"/>
    <!-- Center button -->
    <circle cx="-5" cy="-18" r="9" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <circle cx="-5" cy="-18" r="4" fill="#7986cb" opacity="0.8"/>
  </g>
  <!-- Code labels left -->
  <rect x="40" y="155" width="175" height="100" rx="6" fill="white" stroke="#c5d0f0" stroke-width="1"/>
  <text x="55" y="177" font-family="monospace" font-size="11" fill="#555">def </text><text x="82" y="177" font-family="monospace" font-size="11" fill="#3776ab">update</text><text x="130" y="177" font-family="monospace" font-size="11" fill="#555">():</text>
  <text x="65" y="197" font-family="monospace" font-size="11" fill="#555">if held_keys[</text>
  <text x="65" y="213" font-family="monospace" font-size="11" fill="#e67e00">'w'</text><text x="90" y="213" font-family="monospace" font-size="11" fill="#555">]:</text>
  <text x="75" y="229" font-family="monospace" font-size="11" fill="#2e7d32">move()</text>
  <text x="55" y="247" font-family="monospace" font-size="11" fill="#555">  ...</text>
  <!-- Code labels right -->
  <rect x="585" y="155" width="175" height="80" rx="6" fill="white" stroke="#c5d0f0" stroke-width="1"/>
  <text x="600" y="177" font-family="monospace" font-size="11" fill="#555">def </text><text x="627" y="177" font-family="monospace" font-size="11" fill="#3776ab">input</text><text x="660" y="177" font-family="monospace" font-size="11" fill="#555">(key):</text>
  <text x="610" y="197" font-family="monospace" font-size="11" fill="#555">if key == </text><text x="670" y="197" font-family="monospace" font-size="11" fill="#e67e00">'e'</text><text x="685" y="197" font-family="monospace" font-size="11" fill="#555">:</text>
  <text x="620" y="213" font-family="monospace" font-size="11" fill="#2e7d32">interact()</text>
</svg>
