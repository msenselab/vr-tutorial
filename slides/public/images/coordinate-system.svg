<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="320" height="280" fill="none"/>

  <!-- Z axis (forward, into screen — lower-right for left-handed) -->
  <line x1="140" y1="150" x2="230" y2="230" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="234,224 230,230 224,225" fill="#f59e0b"/>
  <text x="238" y="240" font-size="14" font-weight="700" fill="#f59e0b">Z</text>
  <text x="232" y="256" font-size="10" fill="#92400e">(forward)</text>

  <!-- X axis (right) -->
  <line x1="140" y1="150" x2="290" y2="150" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="285,144 290,150 285,156" fill="#ef4444"/>
  <text x="296" y="154" font-size="14" font-weight="700" fill="#ef4444">X</text>
  <text x="292" y="170" font-size="10" fill="#991b1b">(right)</text>

  <!-- Y axis (up) -->
  <line x1="140" y1="150" x2="140" y2="30" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="134,35 140,30 146,35" fill="#3b82f6"/>
  <text x="148" y="34" font-size="14" font-weight="700" fill="#3b82f6">Y</text>
  <text x="150" y="48" font-size="10" fill="#1e40af">(up)</text>

  <!-- Origin point -->
  <circle cx="140" cy="150" r="4" fill="#374151"/>
  <text x="110" y="168" font-size="11" fill="#6b7280">origin</text>

  <!-- Example point with projection lines -->
  <circle cx="225" cy="80" r="5" fill="#8b5cf6" opacity="0.8"/>
  <!-- vertical line from point down to xz plane -->
  <line x1="225" y1="80" x2="225" y2="150" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- line along x from origin -->
  <line x1="140" y1="150" x2="200" y2="150" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- line along z from x-end to xz-projection -->
  <line x1="200" y1="150" x2="225" y2="170" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="231" y="76" font-size="10" font-weight="600" fill="#7c3aed">(3, 0.5, 4)</text>

  <!-- Label: left-handed -->
  <text x="160" y="18" font-size="11" fill="#9ca3af" text-anchor="middle">Y-up, left-handed</text>
</svg>
