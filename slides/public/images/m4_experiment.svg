<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Left panel: trial condition matrix (2x3 factorial) -->
  <g transform="translate(90, 100)">
    <text x="110" y="-12" font-family="sans-serif" font-size="12" fill="#455a64" text-anchor="middle" font-weight="bold">Conditions</text>
    <!-- Column headers -->
    <text x="52" y="18" font-family="sans-serif" font-size="10" fill="#1e88e5" text-anchor="middle">Cond A</text>
    <text x="112" y="18" font-family="sans-serif" font-size="10" fill="#1e88e5" text-anchor="middle">Cond B</text>
    <text x="172" y="18" font-family="sans-serif" font-size="10" fill="#1e88e5" text-anchor="middle">Cond C</text>
    <!-- Row labels -->
    <text x="-8" y="58" font-family="sans-serif" font-size="10" fill="#43a047" text-anchor="end">Block 1</text>
    <text x="-8" y="108" font-family="sans-serif" font-size="10" fill="#43a047" text-anchor="end">Block 2</text>
    <!-- Trial cells row 1 -->
    <rect x="22" y="30" width="60" height="40" rx="6" fill="#bbdefb" stroke="#1e88e5" stroke-width="1.5"/>
    <text x="52" y="55" font-family="monospace" font-size="9" fill="#1565c0" text-anchor="middle">n=8</text>
    <rect x="82" y="30" width="60" height="40" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="112" y="55" font-family="monospace" font-size="9" fill="#2e7d32" text-anchor="middle">n=8</text>
    <rect x="142" y="30" width="60" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="172" y="55" font-family="monospace" font-size="9" fill="#6a1b9a" text-anchor="middle">n=8</text>
    <!-- Trial cells row 2 -->
    <rect x="22" y="80" width="60" height="40" rx="6" fill="#bbdefb" stroke="#1e88e5" stroke-width="1.5"/>
    <text x="52" y="105" font-family="monospace" font-size="9" fill="#1565c0" text-anchor="middle">n=8</text>
    <rect x="82" y="80" width="60" height="40" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="112" y="105" font-family="monospace" font-size="9" fill="#2e7d32" text-anchor="middle">n=8</text>
    <rect x="142" y="80" width="60" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="172" y="105" font-family="monospace" font-size="9" fill="#6a1b9a" text-anchor="middle">n=8</text>
    <!-- Total -->
    <text x="110" y="142" font-family="sans-serif" font-size="10" fill="#607d8b" text-anchor="middle">48 trials total</text>
  </g>

  <!-- Center: abstract participant icon + VR headset sketch -->
  <g transform="translate(390, 185)">
    <!-- Figure body -->
    <circle cx="0" cy="-80" r="22" fill="white" stroke="#5c6bc0" stroke-width="2"/>
    <!-- VR headset on head -->
    <rect x="-18" y="-92" width="36" height="18" rx="4" fill="#e8eaf6" stroke="#3d5a99" stroke-width="1.5"/>
    <rect x="-14" y="-90" width="12" height="12" rx="2" fill="#90caf9"/>
    <rect x="2" y="-90" width="12" height="12" rx="2" fill="#90caf9"/>
    <!-- Torso -->
    <line x1="0" y1="-58" x2="0" y2="10" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="0" y1="-40" x2="-35" y2="-15" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-40" x2="35" y2="-15" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="0" y1="10" x2="-20" y2="50" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="20" y2="50" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round"/>
    <!-- Label -->
    <text x="0" y="72" font-family="sans-serif" font-size="11" fill="#455a64" text-anchor="middle">Participant</text>
  </g>

  <!-- Arrow: participant → data -->
  <line x1="440" y1="225" x2="530" y2="225" stroke="#90a4ae" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="530,220 542,225 530,230" fill="#90a4ae"/>

  <!-- Right panel: CSV / data output -->
  <g transform="translate(555, 120)">
    <text x="95" y="-12" font-family="sans-serif" font-size="12" fill="#455a64" text-anchor="middle" font-weight="bold">Data Log</text>
    <rect x="0" y="0" width="190" height="200" rx="8" fill="white" stroke="#c5d0f0" stroke-width="1.5"/>
    <!-- Header row -->
    <rect x="0" y="0" width="190" height="26" rx="8" fill="#e8eaf6"/>
    <rect x="0" y="13" width="190" height="13" fill="#e8eaf6"/>
    <text x="18" y="17" font-family="monospace" font-size="9" fill="#3d5a99">trial</text>
    <text x="60" y="17" font-family="monospace" font-size="9" fill="#3d5a99">cond</text>
    <text x="100" y="17" font-family="monospace" font-size="9" fill="#3d5a99">rt_ms</text>
    <text x="148" y="17" font-family="monospace" font-size="9" fill="#3d5a99">correct</text>
    <!-- Data rows -->
    <line x1="0" y1="26" x2="190" y2="26" stroke="#e0e0e0" stroke-width="1"/>
    <text x="18" y="42" font-family="monospace" font-size="9" fill="#555">1</text>
    <text x="60" y="42" font-family="monospace" font-size="9" fill="#1e88e5">A</text>
    <text x="100" y="42" font-family="monospace" font-size="9" fill="#555">842</text>
    <text x="148" y="42" font-family="monospace" font-size="9" fill="#43a047">True</text>
    <line x1="0" y1="48" x2="190" y2="48" stroke="#f0f0f0" stroke-width="1"/>
    <text x="18" y="64" font-family="monospace" font-size="9" fill="#555">2</text>
    <text x="60" y="64" font-family="monospace" font-size="9" fill="#43a047">B</text>
    <text x="100" y="64" font-family="monospace" font-size="9" fill="#555">1204</text>
    <text x="148" y="64" font-family="monospace" font-size="9" fill="#43a047">True</text>
    <line x1="0" y1="70" x2="190" y2="70" stroke="#f0f0f0" stroke-width="1"/>
    <text x="18" y="86" font-family="monospace" font-size="9" fill="#555">3</text>
    <text x="60" y="86" font-family="monospace" font-size="9" fill="#8e24aa">C</text>
    <text x="100" y="86" font-family="monospace" font-size="9" fill="#555">967</text>
    <text x="148" y="86" font-family="monospace" font-size="9" fill="#e53935">False</text>
    <line x1="0" y1="92" x2="190" y2="92" stroke="#f0f0f0" stroke-width="1"/>
    <text x="18" y="108" font-family="monospace" font-size="9" fill="#555">4</text>
    <text x="60" y="108" font-family="monospace" font-size="9" fill="#1e88e5">A</text>
    <text x="100" y="108" font-family="monospace" font-size="9" fill="#555">753</text>
    <text x="148" y="108" font-family="monospace" font-size="9" fill="#43a047">True</text>
    <line x1="0" y1="114" x2="190" y2="114" stroke="#f0f0f0" stroke-width="1"/>
    <text x="95" y="145" font-family="monospace" font-size="11" fill="#bdbdbd" text-anchor="middle">· · ·</text>
    <!-- CSV icon bottom -->
    <text x="10" y="190" font-family="monospace" font-size="10" fill="#8e24aa">data.csv</text>
  </g>

  <!-- Trigger line hint at bottom -->
  <line x1="340" y1="360" x2="460" y2="360" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="400" y="378" font-family="monospace" font-size="10" fill="#e53935" text-anchor="middle" opacity="0.7">EEG trigger</text>
</svg>
