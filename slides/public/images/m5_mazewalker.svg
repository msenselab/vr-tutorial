<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg5)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Maze - top down view, centered -->
  <g transform="translate(215, 45)">
    <!-- Floor -->
    <rect x="0" y="0" width="310" height="360" fill="#f5f0e8" rx="3" stroke="#d0c9bb" stroke-width="1"/>
    <!-- Walls as colored blocks -->
    <g fill="#6d8bbd" stroke="#4a6a9e" stroke-width="0.5" opacity="0.85">
      <!-- Row 0 top border -->
      <rect x="0" y="0" width="310" height="36"/>
      <!-- Row 1 -->
      <rect x="0" y="36" width="36" height="36"/>
      <rect x="108" y="36" width="36" height="36"/>
      <rect x="180" y="36" width="130" height="36"/>
      <!-- Row 2 -->
      <rect x="0" y="72" width="36" height="36"/>
      <rect x="108" y="72" width="36" height="36"/>
      <rect x="180" y="72" width="36" height="36"/>
      <!-- Row 3 -->
      <rect x="36" y="108" width="108" height="36"/>
      <rect x="180" y="108" width="36" height="36"/>
      <rect x="270" y="108" width="40" height="36"/>
      <!-- Row 4 -->
      <rect x="0" y="144" width="36" height="36"/>
      <rect x="144" y="144" width="36" height="36"/>
      <rect x="270" y="144" width="40" height="36"/>
      <!-- Row 5 -->
      <rect x="0" y="180" width="108" height="36"/>
      <rect x="144" y="180" width="36" height="36"/>
      <rect x="216" y="180" width="94" height="36"/>
      <!-- Row 6 -->
      <rect x="108" y="216" width="72" height="36"/>
      <rect x="270" y="216" width="40" height="36"/>
      <!-- Row 7 -->
      <rect x="0" y="252" width="36" height="36"/>
      <rect x="72" y="252" width="108" height="36"/>
      <rect x="216" y="252" width="56" height="36"/>
      <!-- Row 8 -->
      <rect x="0" y="288" width="36" height="36"/>
      <rect x="108" y="288" width="36" height="36"/>
      <rect x="180" y="288" width="36" height="36"/>
      <!-- Row 9 bottom border -->
      <rect x="0" y="324" width="310" height="36"/>
    </g>
    <!-- Path highlight -->
    <polyline points="54,54 54,90 54,126 90,126 90,162 90,198 126,198 126,234 126,270 162,270 198,270 198,234 234,234 234,270 270,270 270,234 270,198 270,162 234,162 234,126 270,126 270,90 270,54"
              stroke="#fb8c00" stroke-width="3.5" fill="none" stroke-dasharray="8,4" opacity="0.85"/>
    <!-- Player marker -->
    <circle cx="54" cy="54" r="11" fill="#1e88e5" opacity="0.95"/>
    <circle cx="54" cy="54" r="5" fill="white"/>
    <!-- Goal marker -->
    <polygon points="270,36 282,58 258,58" fill="#e53935" opacity="0.95"/>
    <text x="270" y="32" font-family="sans-serif" font-size="9" fill="#e53935" text-anchor="middle" font-weight="bold">GOAL</text>
  </g>
  <!-- Labels right side -->
  <text x="570" y="145" font-family="sans-serif" font-size="13" fill="#37474f" font-weight="bold" opacity="0.9">Files</text>
  <circle cx="562" cy="175" r="5" fill="#1e88e5" opacity="0.9"/>
  <text x="575" y="179" font-family="monospace" font-size="12" fill="#1e88e5">experiment.py</text>
  <circle cx="562" cy="200" r="5" fill="#2e7d32" opacity="0.9"/>
  <text x="575" y="204" font-family="monospace" font-size="12" fill="#2e7d32">maze_renderer.py</text>
  <circle cx="562" cy="225" r="5" fill="#8e24aa" opacity="0.9"/>
  <text x="575" y="229" font-family="monospace" font-size="12" fill="#8e24aa">trigger.py</text>
  <!-- Navigation label -->
  <text x="560" y="290" font-family="sans-serif" font-size="12" fill="#fb8c00" opacity="0.9">navigation</text>
  <text x="560" y="308" font-family="sans-serif" font-size="12" fill="#fb8c00" opacity="0.9">trajectory</text>
  <!-- Player / Goal legend -->
  <circle cx="562" cy="345" r="9" fill="#1e88e5" opacity="0.9"/>
  <circle cx="562" cy="345" r="4" fill="white"/>
  <text x="578" y="349" font-family="sans-serif" font-size="11" fill="#37474f">Player</text>
  <polygon points="562,368 570,384 554,384" fill="#e53935" opacity="0.9"/>
  <text x="578" y="380" font-family="sans-serif" font-size="11" fill="#37474f">Goal</text>
</svg>
