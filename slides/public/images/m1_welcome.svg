<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- 3D Cube isometric -->
  <g transform="translate(400, 210)">
    <polygon points="0,-90 78,-45 0,0 -78,-45" fill="#ff9a3c" stroke="#e67e00" stroke-width="1.5"/>
    <polygon points="78,-45 78,45 0,90 0,0" fill="#e06b10" stroke="#e67e00" stroke-width="1.5"/>
    <polygon points="-78,-45 0,0 0,90 -78,45" fill="#f28020" stroke="#e67e00" stroke-width="1.5"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="400" cy="320" rx="100" ry="16" fill="#b0bce8" opacity="0.4"/>
  <!-- Code snippets -->
  <rect x="55" y="150" width="200" height="80" rx="6" fill="white" stroke="#c5d0f0" stroke-width="1"/>
  <text x="70" y="172" font-family="monospace" font-size="11" fill="#3776ab">from ursina import *</text>
  <text x="70" y="192" font-family="monospace" font-size="11" fill="#e67e00">app = Ursina()</text>
  <text x="70" y="212" font-family="monospace" font-size="11" fill="#555">Entity(model='cube')</text>
  <!-- Python snake dots decoration -->
  <circle cx="650" cy="120" r="8" fill="#3776ab" opacity="0.7"/>
  <circle cx="670" cy="120" r="8" fill="#ffd43b" opacity="0.7"/>
  <circle cx="690" cy="100" r="5" fill="#3776ab" opacity="0.4"/>
  <circle cx="630" cy="350" r="6" fill="#ffd43b" opacity="0.4"/>
</svg>
