<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
    <linearGradient id="floor7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg7)"/>
  <!-- Subtle grid -->
  <g stroke="#c5d0f0" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Floor -->
  <ellipse cx="400" cy="390" rx="330" ry="50" fill="url(#floor7)"/>
  <!-- Angel statue -->
  <g transform="translate(270, 195)" opacity="0.95">
    <!-- Base -->
    <rect x="-28" y="132" width="56" height="16" rx="4" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1"/>
    <!-- Body -->
    <rect x="-16" y="52" width="32" height="80" rx="6" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <!-- Head -->
    <circle cx="0" cy="34" r="22" fill="#f5f5f5" stroke="#9fa8da" stroke-width="1.5"/>
    <!-- Face details -->
    <circle cx="-7" cy="30" r="3" fill="#9fa8da" opacity="0.6"/>
    <circle cx="7" cy="30" r="3" fill="#9fa8da" opacity="0.6"/>
    <!-- Halo -->
    <ellipse cx="0" cy="10" rx="30" ry="6" fill="none" stroke="#f9a825" stroke-width="3" opacity="0.9"/>
    <!-- Wings -->
    <path d="M-16,70 Q-85,22 -65,82" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <path d="M16,70 Q85,22 65,82" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-16" y1="80" x2="-42" y2="112" stroke="#c5cae9" stroke-width="9" stroke-linecap="round"/>
    <line x1="16" y1="80" x2="42" y2="112" stroke="#c5cae9" stroke-width="9" stroke-linecap="round"/>
    <!-- Label -->
    <rect x="-38" y="152" width="76" height="18" rx="4" fill="white" stroke="#c5d0f0" stroke-width="1"/>
    <text x="0" y="165" font-family="monospace" font-size="10" fill="#8e24aa" text-anchor="middle">Angel.glb</text>
  </g>
  <!-- Swing -->
  <g transform="translate(530, 175)" opacity="0.95">
    <!-- A-frame posts -->
    <line x1="-62" y1="0" x2="-22" y2="165" stroke="#8d6e63" stroke-width="7" stroke-linecap="round"/>
    <line x1="62" y1="0" x2="22" y2="165" stroke="#8d6e63" stroke-width="7" stroke-linecap="round"/>
    <!-- Cross-braces -->
    <line x1="-72" y1="12" x2="-22" y2="165" stroke="#a1887f" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="72" y1="12" x2="22" y2="165" stroke="#a1887f" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <!-- Top bar -->
    <line x1="-62" y1="0" x2="62" y2="0" stroke="#6d4c41" stroke-width="9" stroke-linecap="round"/>
    <!-- Chains -->
    <line x1="-22" y1="0" x2="-22" y2="95" stroke="#90a4ae" stroke-width="2.5" stroke-dasharray="5,3"/>
    <line x1="22" y1="0" x2="22" y2="95" stroke="#90a4ae" stroke-width="2.5" stroke-dasharray="5,3"/>
    <!-- Seat -->
    <rect x="-34" y="92" width="68" height="14" rx="5" fill="#5d4037" stroke="#8d6e63" stroke-width="2"/>
    <!-- Label -->
    <rect x="-42" y="172" width="84" height="18" rx="4" fill="white" stroke="#c5d0f0" stroke-width="1"/>
    <text x="0" y="185" font-family="monospace" font-size="10" fill="#00838f" text-anchor="middle">Swing.glb</text>
  </g>
  <!-- Code hint card -->
  <rect x="40" y="290" width="200" height="56" rx="6" fill="white" stroke="#c5d0f0" stroke-width="1"/>
  <text x="55" y="312" font-family="monospace" font-size="11" fill="#8e24aa">load_glb(</text><text x="128" y="312" font-family="monospace" font-size="11" fill="#e67e00">'Angel'</text><text x="178" y="312" font-family="monospace" font-size="11" fill="#8e24aa">)</text>
  <text x="55" y="332" font-family="monospace" font-size="11" fill="#00838f">load_glb(</text><text x="128" y="332" font-family="monospace" font-size="11" fill="#e67e00">'Swing'</text><text x="178" y="332" font-family="monospace" font-size="11" fill="#00838f">)</text>
</svg>
