<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Inter, system-ui, sans-serif">
  <!-- Controller body -->
  <path d="M100,120 Q100,80 140,70 L200,60 Q230,55 260,55 Q290,55 320,60 L380,70 Q420,80 420,120 L430,180 Q435,220 410,240 Q385,260 360,240 L340,210 Q320,190 300,190 L220,190 Q200,190 180,210 L160,240 Q135,260 110,240 Q85,220 90,180 Z"
        fill="#374151" stroke="#1f2937" stroke-width="2"/>

  <!-- Controller inner shade -->
  <path d="M120,125 Q120,95 150,85 L205,75 Q235,70 260,70 Q285,70 315,75 L370,85 Q400,95 400,125 L408,170 Q412,200 395,218 Q380,232 365,220 L345,198 Q325,180 305,180 L215,180 Q195,180 175,198 L155,220 Q140,232 125,218 Q108,200 112,170 Z"
        fill="#4b5563" stroke="none"/>

  <!-- D-pad -->
  <rect x="148" y="108" width="14" height="40" rx="2" fill="#6b7280"/>
  <rect x="141" y="115" width="28" height="14" rx="2" fill="#6b7280"/>
  <rect x="148" y="108" width="14" height="40" rx="2" fill="#6b7280"/>

  <!-- Face buttons -->
  <circle cx="375" cy="108" r="8" fill="#ef4444" opacity="0.8"/>
  <circle cx="395" cy="125" r="8" fill="#3b82f6" opacity="0.8"/>
  <circle cx="355" cy="125" r="8" fill="#22c55e" opacity="0.8"/>
  <circle cx="375" cy="142" r="8" fill="#f59e0b" opacity="0.8"/>

  <!-- Left stick base -->
  <circle cx="210" cy="140" r="24" fill="#1f2937" stroke="#111827" stroke-width="1.5"/>
  <circle cx="210" cy="140" r="16" fill="#374151" stroke="#4b5563" stroke-width="1"/>

  <!-- Right stick base -->
  <circle cx="320" cy="155" r="24" fill="#1f2937" stroke="#111827" stroke-width="1.5"/>
  <circle cx="320" cy="155" r="16" fill="#374151" stroke="#4b5563" stroke-width="1"/>

  <!-- Left stick axes -->
  <g>
    <!-- Horizontal axis 0 -->
    <line x1="170" y1="140" x2="250" y2="140" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" opacity="0.9"/>
    <polygon points="247,136 253,140 247,144" fill="#ef4444"/>
    <polygon points="173,136 167,140 173,144" fill="#ef4444"/>
    <!-- Vertical axis 1 -->
    <line x1="210" y1="102" x2="210" y2="178" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" opacity="0.9"/>
    <polygon points="206,105 210,99 214,105" fill="#3b82f6"/>
    <polygon points="206,175 210,181 214,175" fill="#3b82f6"/>
  </g>

  <!-- Right stick axes -->
  <g>
    <!-- Horizontal axis 2 -->
    <line x1="280" y1="155" x2="360" y2="155" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" opacity="0.9"/>
    <polygon points="357,151 363,155 357,159" fill="#f59e0b"/>
    <polygon points="283,151 277,155 283,159" fill="#f59e0b"/>
    <!-- Vertical axis 3 -->
    <line x1="320" y1="117" x2="320" y2="193" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3" opacity="0.9"/>
    <polygon points="316,120 320,114 324,120" fill="#8b5cf6"/>
    <polygon points="316,190 320,196 324,190" fill="#8b5cf6"/>
  </g>

  <!-- Bumpers -->
  <rect x="130" y="62" width="70" height="12" rx="6" fill="#6b7280" stroke="#4b5563" stroke-width="1"/>
  <rect x="320" y="62" width="70" height="12" rx="6" fill="#6b7280" stroke="#4b5563" stroke-width="1"/>

  <!-- Labels: Left stick -->
  <text x="210" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">Left Stick</text>
  <text x="210" y="225" text-anchor="middle" font-size="11" fill="#9ca3af">Movement</text>
  <text x="258" y="136" font-size="10" font-weight="600" fill="#ef4444">axis 0</text>
  <text x="218" y="96" font-size="10" font-weight="600" fill="#3b82f6">axis 1</text>

  <!-- Labels: Right stick -->
  <text x="320" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">Right Stick</text>
  <text x="320" y="225" text-anchor="middle" font-size="11" fill="#9ca3af">Camera</text>
  <text x="368" y="151" font-size="10" font-weight="600" fill="#f59e0b">axis 2</text>
  <text x="328" y="111" font-size="10" font-weight="600" fill="#8b5cf6">axis 3</text>

  <!-- Deadzone note -->
  <rect x="140" y="252" width="240" height="30" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="260" y="272" text-anchor="middle" font-size="11" fill="#9ca3af">Deadzone = 0.2 (ignore small drift)</text>

  <!-- Button labels -->
  <text x="165" y="56" text-anchor="middle" font-size="9" fill="#9ca3af">LB</text>
  <text x="355" y="56" text-anchor="middle" font-size="9" fill="#9ca3af">RB</text>
</svg>
